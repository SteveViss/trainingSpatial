name: Build and publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        run: |
          install.packages(c("pak"), repos = "https://cloud.r-project.org")
          pak::pak(c(
            "sf", "terra", "geodata", "tmap", "dplyr",
            "mapview", "ggplot2", "tidyterra",
            "rnaturalearthdata",
            "ropensci/rnaturalearthhires",
            "ropensci/rnaturalearth"
          ))
        shell: Rscript {0}

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Download cached data
        run: |
          mkdir -p data/elevation
          mkdir -p data/OB_LR
          wget -q -O data/elevation/CAN_elv_msk.zip \
            https://geodata.ucdavis.edu/geodata/elv/CAN_elv_msk.zip
          unzip -o -q data/elevation/CAN_elv_msk.zip -d data/elevation/

      - name: Build presentation
        run: quarto render index.qmd

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
