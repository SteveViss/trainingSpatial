name: Build and publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            sf
            terra
            geodata
            mapview
            rnaturalearth
            rnaturalearthdata

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Download cached data
        run: |
          mkdir -p data/elevation
          wget -q -O data/elevation/CAN_elv_msk.zip \
            https://geodata.ucdavis.edu/geodata/elv/CAN_elv_msk.zip
          unzip -q data/elevation/CAN_elv_msk.zip -d data/elevation/

      - name: Build presentation
        run: quarto render index.qmd

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
